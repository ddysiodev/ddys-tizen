<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#071315">
    <title>DDYS Tizen</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="assets/icon.png" alt="" class="brand-icon">
          <div>
            <h1>DDYS</h1>
            <p id="statusLine">Starting TV app...</p>
          </div>
        </div>
        <nav id="mainNav" class="nav" aria-label="Main navigation">
          <button data-focusable data-view="home" class="nav-item is-active">Home</button>
          <button data-focusable data-view="search" class="nav-item">Search</button>
          <button data-focusable data-view="favorites" class="nav-item">Favorites</button>
          <button data-focusable data-view="history" class="nav-item">History</button>
          <button data-focusable data-view="settings" class="nav-item">Settings</button>
          <button data-focusable data-view="check" class="nav-item">Self Check</button>
        </nav>
      </header>

      <main id="screen" class="screen" aria-live="polite"></main>
    </div>

    <section id="playerScreen" class="player-screen" hidden>
      <video id="fallbackVideo" class="fallback-video" playsinline></video>
      <div class="player-overlay">
        <div>
          <p class="eyebrow" id="playerSource">DDYS</p>
          <h2 id="playerTitle">Preparing playback</h2>
          <p id="playerStatus">Opening player...</p>
        </div>
        <div class="player-actions">
          <button data-focusable data-player-action="toggle">Play / Pause</button>
          <button data-focusable data-player-action="seek-back">Back 15s</button>
          <button data-focusable data-player-action="seek-forward">Forward 30s</button>
          <button data-focusable data-player-action="stop">Back</button>
        </div>
      </div>
    </section>

    <div id="toast" class="toast" hidden></div>

    <script src="$WEBAPIS/webapis/webapis.js"></script>
    <script src="src/store.js"></script>
    <script src="src/ddys-client.js"></script>
    <script src="src/focus.js"></script>
    <script src="src/player.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
